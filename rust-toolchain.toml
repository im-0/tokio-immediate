[toolchain]
# Must be in sync with `$SRC_ROOT/ci/container/base/Containerfile`.
# Must be in sync with `$SRC_ROOT/.github/workflows/ci.yml`.
# Do not forget to generate new CI images (both base and caches) after updating this.
channel = "1.95.0"
profile = "default"
components = [
    "rust-analyzer",
    "rust-src",
    "clippy",
]
targets = [
    "wasm32-unknown-unknown",
]
